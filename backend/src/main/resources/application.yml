spring:
  application:
    name: housekeeping-now
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/housekeeping_service?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  
  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-email-password
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: housekeeping.housekeepingnow.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: housekeeping-now-secret-key-2024-please-change-in-production
  expiration: 86400000 # 24小时，单位：毫秒
  refresh-expiration: 604800000 # 7天，单位：毫秒

# 支付配置
payment:
  # 支付宝配置（沙箱环境）
  alipay:
    app-id: 9021000159616281
    private-key: 
    public-key: 
    gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
    notify-url: http://n22a6889.natappfree.cc/api/payment/alipay/notify
    return-url: http://n22a6889.natappfree.cc/api/payment/alipay/return
    # 沙箱买家UID（用于测试）
    sandbox-buyer-id: 2088721092619762
  
  # 微信支付配置
  wechat:
    app-id: your-wechat-app-id
    mch-id: your-wechat-mch-id
    api-v3-key: your-wechat-api-v3-key
    cert-path: classpath:cert/wechat/apiclient_cert.pem
    private-key-path: classpath:cert/wechat/apiclient_key.pem
    notify-url: http://your-domain.com/api/payment/wechat/notify

# 文件存储配置
file:
  upload:
    path: D:/housekeeping-uploads/
    url-prefix: http://localhost:8080/uploads/
  certificate:
    path: D:/housekeeping-uploads/certificates/
    allowed-types: pdf,jpg,jpeg,png

# 短信服务配置
sms:
  provider: aliyun # aliyun, tencent
  aliyun:
    access-key-id: your-aliyun-access-key-id
    access-key-secret: your-aliyun-access-key-secret
    sign-name: 家政服务
    template-code: SMS_123456789
  tencent:
    secret-id: your-tencent-secret-id
    secret-key: your-tencent-secret-key
    app-id: your-tencent-app-id
    sign-name: 家政服务

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: 家政服务预约平台API文档
    description: 家政服务预约平台接口文档
    version: 1.0.0
    contact:
      name: 开发团队
      email: dev@housekeeping.com

# 日志配置
logging:
  level:
    root: INFO
    housekeeping.housekeepingnow: DEBUG
    org.springframework.web: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/housekeeping-now.log
    max-size: 10MB
    max-history: 30

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

