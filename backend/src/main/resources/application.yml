# 服务器配置
server:
  port: 8080  # 端口可改为8081（若8080被占用）
  servlet:
    context-path: /  # 上下文路径，默认/即可

# Spring核心配置
spring:
  # 数据库配置（必须匹配你的本地MySQL）
  datasource:
    url: jdbc:mysql://localhost:3306/housekeeping_service01?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root  # 替换为你的MySQL用户名（默认root）
    password: 123456  # 替换为你的MySQL密码（无密码则留空""）
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 校验配置（适配Java 17的jakarta.validation）
  validation:
    enable: true

# MyBatis配置（可选，确保Mapper扫描）
mybatis:
  mapper-locations: classpath:com/example/housekeepingservice/mapper/*.xml  # 扫描Mapper XML文件
  type-aliases-package: com.example.housekeepingservice.entity  # 实体类别名包
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰（如create_time→createTime）

# JWT配置（核心：解决jwt.secret解析失败）
jwt:
  secret: housekeeping_biye_2024  # 密钥，随便写，毕设够用
  expire: 86400000                # Token过期时间：24小时（毫秒）
  header: Token                   # 前端传Token的请求头字段名